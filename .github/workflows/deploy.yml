name: Deploy blog

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '5 16 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: blog-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate daily post
        run: npm run generate:post

      - name: Commit generated post if changed
        run: |
          if [[ -n "$(git status --porcelain posts)" ]]; then
            git config user.name "Aotsuki Mio"
            git config user.email "mio.0x7f@gmail.com"
            git add posts
            git commit -m "chore: add daily post"
            git push
          fi

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
